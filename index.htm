<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Pro Trading</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <!-- Login -->
        <div id="login" class="card">
            <h2>Acesso Restrito</h2>
            <input type="password" id="passInput" placeholder="Sua senha">
            <button onclick="validarLogin()">Entrar</button>
        </div>

        <!-- Calculadora -->
        <div id="app" class="card" style="display:none;">
            <h2>Calculadora de Estratégia</h2>
            
            <label>Investimento Total (R$):</label>
            <input type="number" id="stake" placeholder="Ex: 100">
            
            <label>Odd do 0x0 (Ex: 15.0):</label>
            <input type="number" id="odd0x0" placeholder="Ex: 15.0">
            
            <label>Odd do Lay Empate (Ex: 3.5):</label>
            <input type="number" id="oddLay" placeholder="Ex: 3.5">
            
            <button onclick="calcular()" style="background: #00e676; color: black; font-weight: bold;">Calcular Saída</button>

            <div id="resultado" class="resultado-box" style="display:none;"></div>
            
            <div class="instrucoes">
                <h3>Como operar:</h3>
                <ol>
                    <li>Insira o valor total e as odds atuais do mercado.</li>
                    <li>Faça o Back 0x0 com os 10% sugeridos.</li>
                    <li>Faça o Lay Empate com os 90% restantes.</li>
                    <li>Ao sair o gol, feche ambas as posições (Cashout).</li>
                </ol>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
