<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Pro Trading</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <div id="login" class="card">
            <h2>Acesso Restrito</h2>
            <input type="password" id="passInput" placeholder="Sua senha">
            <button onclick="validarLogin()">Entrar</button>
        </div>

        <div id="app" class="card" style="display:none;">
            <h2>Calculadora de Trading</h2>
            <input type="number" id="stake" placeholder="Investimento Total (R$)">
            <button onclick="calcular()">Calcular</button>
            <div id="resultado" class="resultado-box" style="display:none;"></div>
            <button onclick="location.reload()" style="background:#555;">Sair</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
